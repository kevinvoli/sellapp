name: Deploy to VPS

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # 1. BUILD
  # ─────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            dist/
            package.json
            package-lock.json
          retention-days: 1

  # ─────────────────────────────────────────────
  # 2. DEPLOY
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: artifact/

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.VPS_PORT }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Create app directory on VPS
        run: |
          ssh -p ${{ secrets.VPS_PORT }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "mkdir -p ${{ secrets.VPS_APP_DIR }}"

      - name: Sync build to VPS
        run: |
          rsync -az --delete \
            -e "ssh -p ${{ secrets.VPS_PORT }}" \
            artifact/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_APP_DIR }}/

      - name: Write .env on VPS
        run: |
          ssh -p ${{ secrets.VPS_PORT }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cat > ${{ secrets.VPS_APP_DIR }}/.env << 'ENVEOF'
          PORT=${{ secrets.APP_PORT }}
          WA_TOKEN=${{ secrets.WA_TOKEN }}
          WA_PHONE_NUMBER_ID=${{ secrets.WA_PHONE_NUMBER_ID }}
          WA_API_VERSION=${{ secrets.WA_API_VERSION }}
          WA_TEMPLATE_NAME=${{ secrets.WA_TEMPLATE_NAME }}
          WA_TEMPLATE_LANGUAGE=${{ secrets.WA_TEMPLATE_LANGUAGE }}
          ENVEOF"

      - name: Install production dependencies & restart PM2
        run: |
          ssh -p ${{ secrets.VPS_PORT }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
          set -e
          cd ${{ secrets.VPS_APP_DIR }}
          npm ci
          if pm2 list | grep -q "sellapp"; then
            pm2 reload sellapp --update-env
          else
            pm2 start dist/main.js \
              --name sellapp \
              --max-memory-restart 512M
          fi
          pm2 save
          EOF

      - name: Health check
        run: |
          sleep 5
          ssh -p ${{ secrets.VPS_PORT }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "curl -sf http://localhost:${{ secrets.APP_PORT }}/health || \
             curl -sf http://localhost:${{ secrets.APP_PORT }} || \
             (pm2 logs sellapp --lines 20 --nostream && exit 1)"
